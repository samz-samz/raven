<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Pricing Cards</title>
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="pricing.css">
</head>
<body>

    <h1>Our Pricing Plans</h1>

    <div class="pricing-container">
        <!-- Basic Plan -->
        <div class="pricing-card">
            <h2>Basic</h2>
            <p class="price">$900</p>
            <ul>
                <li>500 mb</li>
                <li>for 2 days</li>
                <li>Email Support</li>
            </ul>
            <a href="#" class="btn">Choose Plan</a>
        </div>

        <!-- Standard Plan -->
        <div class="pricing-card">
            <h2>Standard</h2>
            <p class="price">$19,00</p>
            <ul>
                <li>50gb</li>
                <li>for 5 days </li>
                <li>Priority Support</li>
            </ul>
            <a href="#" class="btn">Choose Plan</a>
        </div>

        <!-- Premium Plan -->
        <div class="pricing-card">
            <h2>Premium</h2>
            <p class="price">$290,00</p>
            <ul>
                <li>1 terabtyes</li>
                <li>1 week</li>
                <li>24/7 Support</li>
            </ul>
            <a href="#" class="btn">Choose Plan</a>
        </div>
    </div>

</body>
</html>
